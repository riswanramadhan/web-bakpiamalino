<!DOCTYPE html>
<html>
<head>
  <title>Video Preview</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #fafafa; }
    .video-container { display: flex; flex-direction: column; gap: 30px; }
    .video-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    video { max-width: 100%; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>WhatsApp Videos Preview</h1>
  <div class="video-container">
    <div class="video-card">
      <h2>Video Default (WhatsApp Video 2026-06-24 at 20.55.33.mp4)</h2>
      <video src="video/WhatsApp Video 2026-06-24 at 20.55.33.mp4" width="480" autoplay loop muted playsinline></video>
    </div>
    <div class="video-card">
      <h2>Video (1) (WhatsApp Video 2026-06-24 at 20.55.33 (1).mp4)</h2>
      <video src="video/WhatsApp Video 2026-06-24 at 20.55.33 (1).mp4" width="480" autoplay loop muted playsinline></video>
    </div>
    <div class="video-card">
      <h2>Video (2) (WhatsApp Video 2026-06-24 at 20.55.33 (2).mp4)</h2>
      <video src="video/WhatsApp Video 2026-06-24 at 20.55.33 (2).mp4" width="480" autoplay loop muted playsinline></video>
    </div>
  </div>
</body>
</html>
